services:
  # Backend Web Service (FastAPI)
  - type: web
    name: sentira-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Standardize Python version for Render

  # Frontend Static Site (Vite/React)
  - type: web
    name: sentira-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sentira-backend
          envVarKey: RENDER_EXTERNAL_URL
